<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCA · Employer Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede8;
  --bg2: #e8e4de;
  --bg3: #faf8f5;
  --card: #ffffff;
  --card2: #fdf9f4;
  --border: rgba(180,155,100,0.18);
  --border2: rgba(0,0,0,0.07);
  --gold: #b8922e;
  --gold2: #d4aa45;
  --gold-bg: rgba(184,146,46,0.08);
  --gold-light: #f5edd8;
  --dark: #0f0e0c;
  --dark2: #1e1c18;
  --white: #ffffff;
  --text: #1a1814;
  --text2: #6b6560;
  --text3: #a09890;
  --red: #c94444;
  --green: #2e8b5a;
  --blue: #3a5fb5;
  --score-high: #2e8b5a;
  --score-mid: #b8922e;
  --score-low: #c94444;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════
   LOGIN SCREEN
═══════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
}

#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 50%, rgba(184,146,46,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 50% 70% at 85% 30%, rgba(184,146,46,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.login-box {
  position: relative; z-index: 1;
  width: 440px;
  padding: 52px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,146,46,0.2);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}

.login-logo {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 40px;
}

.login-logo-svg {
  width: 44px; height: 44px;
}

.login-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 0.18em;
  color: #ffffff;
}
.login-brand span { color: var(--gold2); }

.login-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
  margin-bottom: 10px;
}

.login-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px; letter-spacing: 0.03em;
  margin-bottom: 36px;
  line-height: 1;
  color: #ffffff;
}

.login-field { margin-bottom: 18px; }
.login-label {
  display: block;
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.4); margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.login-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #ffffff;
  padding: 15px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  border-radius: 10px;
  transition: border-color 0.2s, background 0.2s;
}
.login-input::placeholder { color: rgba(255,255,255,0.2); }
.login-input:focus { border-color: rgba(184,146,46,0.5); background: rgba(255,255,255,0.08); }

.login-btn {
  width: 100%; margin-top: 8px;
  background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 100%);
  color: var(--dark);
  border: none; cursor: pointer;
  padding: 17px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 10px;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 20px rgba(184,146,46,0.35);
}
.login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }

.login-err {
  margin-top: 14px;
  font-size: 12px; color: #e57373;
  font-family: 'JetBrains Mono', monospace;
  min-height: 20px;
  text-align: center;
}

/* ═══════════════════════════════
   DASHBOARD
═══════════════════════════════ */
#dashboard { display: none; min-height: 100vh; }

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 50;
  height: 64px;
  background: rgba(240,237,232,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 32px;
  gap: 20px;
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
}
.nav-logo-svg { width: 32px; height: 32px; }
.nav-logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.16em;
  color: var(--dark);
}
.nav-logo-text span { color: var(--gold); }

.nav-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

.nav-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.18em;
  color: var(--text3); text-transform: uppercase;
}

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

.nav-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text3);
  background: rgba(0,0,0,0.04);
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
}

.nav-logout {
  background: none; border: 1px solid var(--border2);
  color: var(--text3); cursor: pointer;
  padding: 7px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  border-radius: 8px;
  transition: all 0.2s;
}
.nav-logout:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }

/* MAIN */
.main { display: flex; height: calc(100vh - 64px); }

/* SIDEBAR */
.sidebar {
  width: 300px; min-width: 300px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border2);
}

.sidebar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 0.1em;
  color: var(--text);
  margin-bottom: 12px;
}

.filter-row { display: flex; gap: 8px; }

.filter-select {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 8px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; outline: none;
  cursor: pointer;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
}
.filter-select option { background: #ffffff; color: var(--text); }

.sidebar-list {
  flex: 1; overflow-y: auto;
  padding: 10px 10px;
}
.sidebar-list::-webkit-scrollbar { width: 3px; }
.sidebar-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

.candidate-item {
  padding: 14px 14px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 6px;
  position: relative;
  border-radius: var(--radius-sm);
  background: transparent;
}
.candidate-item:hover { background: var(--card); border-color: var(--border2); box-shadow: var(--shadow-sm); }
.candidate-item.active { background: var(--card); border-color: rgba(184,146,46,0.3); box-shadow: var(--shadow); }
.candidate-item.active::before {
  content: '';
  position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: var(--gold);
  border-radius: 0 2px 2px 0;
}

.ci-name {
  font-size: 14px; font-weight: 600;
  margin-bottom: 3px;
  color: var(--text);
}
.ci-role {
  font-size: 11px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.03em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 9px;
}
.ci-meta { display: flex; align-items: center; gap: 7px; }

.ci-status {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 6px;
}
.status-applied { background: rgba(58,95,181,0.1); color: var(--blue); }
.status-registered { background: rgba(184,146,46,0.12); color: var(--gold); }
.status-interviewed { background: rgba(46,139,90,0.1); color: var(--green); }
.status-hired { background: rgba(46,139,90,0.18); color: var(--green); }
.status-rejected { background: rgba(201,68,68,0.1); color: var(--red); }

.ci-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  margin-left: auto;
}

.ci-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3);
}

.sidebar-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

/* CONTENT */
.content {
  flex: 1; overflow-y: auto;
  background: var(--bg);
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 20px 24px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.stat-card {
  background: var(--bg3);
  padding: 20px 22px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.stat-card:hover::after { opacity: 1; }

.stat-icon {
  width: 32px; height: 32px;
  background: var(--gold-bg);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  color: var(--gold);
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 6px;
}
.stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px; line-height: 1;
  color: var(--dark);
}
.stat-value.gold { color: var(--gold); }
.stat-sub {
  font-size: 11px; color: var(--text3);
  margin-top: 3px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
}

/* EMPTY STATE */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: calc(100% - 120px);
  color: var(--text3);
}
.empty-icon {
  width: 64px; height: 64px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  background: var(--card);
  box-shadow: var(--shadow-sm);
}
.empty-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; color: var(--text2); }
.empty-sub { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }

/* CANDIDATE DETAIL */
.detail {
  padding: 28px 32px;
  animation: fadeUp 0.22s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.detail-header {
  display: flex; align-items: center;
  gap: 20px; margin-bottom: 24px;
  padding: 24px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  box-shadow: var(--shadow);
}

.detail-avatar {
  width: 64px; height: 64px; min-width: 64px;
  background: linear-gradient(135deg, var(--gold-light), rgba(184,146,46,0.15));
  border: 1.5px solid rgba(184,146,46,0.3);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; color: var(--gold);
}

.detail-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; letter-spacing: 0.03em;
  line-height: 1;
  color: var(--dark);
}
.detail-email {
  font-size: 13px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 5px;
}
.detail-role {
  font-size: 11px; color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.08em; margin-top: 6px;
  font-weight: 500;
}

.detail-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.btn {
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: none; cursor: pointer;
  transition: all 0.2s;
  text-decoration: none; display: inline-block;
  border-radius: 8px;
}
.btn-gold { background: linear-gradient(135deg, var(--gold2), var(--gold)); color: var(--dark); box-shadow: 0 2px 8px rgba(184,146,46,0.3); }
.btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-outline { background: none; border: 1px solid var(--border2); color: var(--text2); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-red { background: rgba(201,68,68,0.07); border: 1px solid rgba(201,68,68,0.2); color: var(--red); }
.btn-red:hover { background: rgba(201,68,68,0.14); }
.btn-green { background: rgba(46,139,90,0.07); border: 1px solid rgba(46,139,90,0.2); color: var(--green); }
.btn-green:hover { background: rgba(46,139,90,0.14); }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

.detail-block {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}
.detail-block:hover { box-shadow: var(--shadow); }

.block-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px;
}

.block-value {
  font-size: 15px; font-weight: 500;
  line-height: 1.5;
  color: var(--text);
}

.block-value.muted { color: var(--text3); font-style: italic; font-size: 13px; }

/* SCORE BAR */
.score-wrap { margin-top: 8px; }
.score-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px; line-height: 1;
}
.score-bar {
  height: 5px; background: rgba(0,0,0,0.07);
  border-radius: 3px; margin-top: 10px; overflow: hidden;
}
.score-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
}

.score-high { color: var(--score-high); }
.score-mid  { color: var(--score-mid); }
.score-low  { color: var(--score-low); }
.fill-high  { background: linear-gradient(90deg, var(--score-high), #4db87a); }
.fill-mid   { background: linear-gradient(90deg, var(--score-mid), var(--gold2)); }
.fill-low   { background: linear-gradient(90deg, var(--score-low), #e06b6b); }

/* INTERVIEW BLOCK */
.interview-block {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.interview-block:hover { box-shadow: var(--shadow); }

.interview-header {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background 0.15s;
}
.interview-header:hover { background: rgba(0,0,0,0.015); }
.interview-header.open { border-bottom-color: var(--border2); }

.ih-avatar {
  width: 36px; height: 36px;
  background: var(--gold-light);
  border: 1.5px solid rgba(184,146,46,0.25);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.ih-name { font-size: 14px; font-weight: 600; color: var(--text); }
.ih-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text3);
  margin-top: 1px;
}
.ih-score {
  margin-left: auto;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; line-height: 1;
}
.ih-chevron {
  color: var(--text3); font-size: 11px;
  transition: transform 0.2s;
}
.ih-chevron.open { transform: rotate(180deg); }

.interview-body { padding: 20px 22px; display: none; }
.interview-body.open { display: block; }

.summary-text {
  font-size: 14px; line-height: 1.75;
  color: var(--text2);
  margin-bottom: 16px;
}

.transcript-toggle {
  background: none; border: 1px solid var(--border2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3);
  cursor: pointer; letter-spacing: 0.1em;
  padding: 6px 14px; text-transform: uppercase;
  border-radius: 6px;
  transition: all 0.15s;
}
.transcript-toggle:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }

.transcript-box {
  margin-top: 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  padding: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; line-height: 2;
  color: var(--text2);
  border-radius: 8px;
  max-height: 260px; overflow-y: auto;
  display: none;
}
.transcript-box.open { display: block; }
.transcript-box::-webkit-scrollbar { width: 3px; }
.transcript-box::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

/* STATUS SELECTOR */
.status-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 12px;
}
.status-btn {
  padding: 6px 14px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid var(--border2);
  background: transparent; cursor: pointer; color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  border-radius: 7px;
}
.status-btn:hover, .status-btn.active {
  border-color: var(--gold); color: var(--gold);
  background: var(--gold-bg);
}

/* LOADING */
.loading-spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.08);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 40px;
  color: var(--text3); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  padding: 13px 20px;
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: rgba(46,139,90,0.5); color: #5ecf8e; }
.toast.err { border-color: rgba(201,68,68,0.5); color: #e57373; }

/* SECTION LABEL */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg class="login-logo-svg" viewBox="0 0 92 92" xmlns="http://www.w3.org/2000/svg">
        <polygon points="46,4 88,27 88,65 46,88 4,65 4,27" fill="rgba(184,146,46,0.12)"/>

    <div class="login-field">

</div>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="dashboard">
  <nav class="nav">
    <div class="nav-logo">
      <svg class="nav-logo-svg" viewBox="0 0 92 92" xmlns="http://www.w3.org/2000/svg">
        <polygon points="46,4 88,27 88,65 46,88 4,65 4,27" fill="rgba(184,146,46,0.1)"/>

        <polygon points="88,27 88,65 46,46" fill="#A07820"/>
        <polygon points="46,14 76,32 46,46" fill="#D4A836"/>
        <polygon points="46,14 46,46 16,32" fill="#B08820"/>
        <polygon points="46,4 88,27 88,65 46,88 4,65 4,27" fill="none" stroke="rgba(212,168,54,0.35)" stroke-width="1.5"/>
      </svg>
      <div class="nav-logo-text">ARC<span>A</span></div>

  <div class="main">
    <!-- SIDEBAR -->

      <div class="sidebar-header">

            <option value="marketing-content-lead">Marketing Lead</option>
          </select>
          <select class="filter-select" id="filterStatus" onchange="applyFilters()">
            <option value="">All statuses</option>
            <option value="applied">Applied</option>

          <div class="stat-value" id="statTotal">—</div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="stat-label">Interviews Done</div>
          <div class="stat-value gold" id="statInterviews">—</div>

        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
          <div class="stat-label">Avg AI Score</div>
          <div class="stat-value" id="statScore">—</div>
          <div class="stat-sub">out of 10</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="stat-label">This Week</div>
          <div class="stat-value" id="statWeek">—</div>

      <!-- EMPTY / DETAIL -->
      <div id="detailArea">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="empty-title">Select a candidate</div>
          <div class="empty-sub">click on name in the list</div>
        </div>
      </div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════
const SB_URL = 'https://czywpqncatwxdiynmvzo.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6eXdwcW5jYXR3eGRpeW5tdnpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjA1MzcsImV4cCI6MjA5MzEzNjUzN30.7DulYfQfZ_JQ-YOJ1O2f9Z9BIppIpvbPzLPVU2iRvsk';

const LOGIN_HASH = 'a6fbf05a49735a0a08cee4cd74b1db18388649e23a93a5f4fb9039bea00e2f0a';
const PASS_HASH  = 'ef80fc1f63f84f0131cce819ab86afbc7df9d0fb21c55d68bc5255746bfd70c0';

const VACANCY_LABELS = {
  'robotics-sw-eng': 'Robotics SW Eng',
  'computer-vision': 'Computer Vision',
  'mechanical-design': 'Mechanical Design',
  'ai-training-lead': 'AI Training Lead',
  'operations-manager': 'Operations Manager',
  'marketing-content-lead': 'Marketing Lead'
};

const AVATAR_EMOJI = { victoria: '👩', bogdan: '👨', oleksii: '🧑', julia: '👱', default: '🤖' };

let allCandidates = [];
let allInterviews = [];
let activeCandidateId = null;

// ═══════════════════════════════
// AUTH
// ═══════════════════════════════
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Fill in all fields'; return; }
  const eHash = await sha256(email);
  const pHash = await sha256(pass);
  if (eHash === LOGIN_HASH && pHash === PASS_HASH) {
    sessionStorage.setItem('arca_auth', '1');
    showDashboard();
  } else {
    errEl.textContent = '✗ Invalid credentials';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  sessionStorage.removeItem('arca_auth');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
async function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  startClock();
  await Promise.all([loadCandidates(), loadInterviews()]);
  renderStats();
  renderList();
}

function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('navTime').textContent =
      now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════
// DATA
// ═══════════════════════════════
async function sbFetch(path) {
  const res = await fetch(SB_URL + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  return res.json();
}

async function loadCandidates() {
  allCandidates = await sbFetch('/candidates?select=*&order=created_at.desc');
  if (!Array.isArray(allCandidates)) allCandidates = [];
}

async function loadInterviews() {
  allInterviews = await sbFetch('/interviews?select=*&order=created_at.desc');
  if (!Array.isArray(allInterviews)) allInterviews = [];
}

// ═══════════════════════════════
// STATS
// ═══════════════════════════════
function renderStats() {
  const total = allCandidates.length;
  const interviewed = allInterviews.length;
  const scores = allInterviews.map(i => i.ai_score).filter(s => s != null);
  const avgScore = scores.length ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1) : '—';
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
  const thisWeek = allCandidates.filter(c => new Date(c.created_at) > weekAgo).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statInterviews').textContent = interviewed;
  document.getElementById('statScore').textContent = avgScore;
  document.getElementById('statWeek').textContent = thisWeek;
}

// ═══════════════════════════════
// LIST
// ═══════════════════════════════
function applyFilters() {
  const vac    = document.getElementById('filterVacancy').value;
  const status = document.getElementById('filterStatus').value;
  const filtered = allCandidates.filter(c =>
    (!vac    || c.vacancy_id === vac) &&
    (!status || c.status === status)
  );
  renderList(filtered);
}

function renderList(candidates) {
  if (!candidates) candidates = allCandidates;
  const el = document.getElementById('candidateList');
  if (!candidates.length) {
    el.innerHTML = '<div class="sidebar-empty">No candidates found</div>';
    return;
  }
  el.innerHTML = candidates.map(c => {
    const interviews = allInterviews.filter(i => i.candidate_id === c.id);
    const lastScore  = interviews.length ? interviews[0].ai_score : null;
    const scoreColor = lastScore >= 8 ? 'var(--green)' : lastScore >= 5 ? 'var(--gold)' : lastScore ? 'var(--red)' : 'var(--gray2)';
    const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.email;
    const date = new Date(c.created_at).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
    return '<div class="candidate-item' + (c.id === activeCandidateId ? ' active' : '') + '" onclick="selectCandidate(\'' + c.id + '\')">' +
      '<div class="ci-name">' + esc(name) + '</div>' +
      '<div class="ci-role">' + (VACANCY_LABELS[c.vacancy_id] || c.vacancy_id || '—') + '</div>' +
      '<div class="ci-meta">' +
        '<span class="ci-status status-' + (c.status||'applied') + '">' + (c.status||'applied') + '</span>' +
        (lastScore ? '<span class="ci-score" style="color:' + scoreColor + '">' + lastScore + '/10</span>' : '') +
        '<span class="ci-date">' + date + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ═══════════════════════════════
// DETAIL
// ═══════════════════════════════
function selectCandidate(id) {
  activeCandidateId = id;
  renderList();
  const c = allCandidates.find(x => x.id === id);
  if (!c) return;
  const interviews = allInterviews.filter(i => i.candidate_id === id);
  const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.email;
  const initials = [c.first_name, c.last_name].filter(Boolean).map(n => n[0]).join('').toUpperCase() || '?';
  const date = new Date(c.created_at).toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'});

  document.getElementById('detailArea').innerHTML =
    '<div class="detail">' +

      '<div class="detail-header">' +
        '<div class="detail-avatar">' + esc(initials) + '</div>' +
        '<div>' +
          '<div class="detail-name">' + esc(name) + '</div>' +
          '<div class="detail-email">' + esc(c.email) + '</div>' +
          '<div class="detail-role">' + (VACANCY_LABELS[c.vacancy_id] || c.vacancy_id || '—') + '</div>' +
        '</div>' +
        '<div class="detail-actions">' +
          (c.resume_url ? '<a class="btn btn-gold" href="' + esc(c.resume_url) + '" target="_blank">Download CV</a>' : '') +
        '</div>' +
      '</div>' +

      '<div class="detail-grid">' +
        '<div class="detail-block">' +
          '<div class="block-label">Applied</div>' +
          '<div class="block-value">' + date + '</div>' +
        '</div>' +
        '<div class="detail-block">' +
          '<div class="block-label">Status</div>' +
          '<div class="block-value">' +
            '<span class="ci-status status-' + (c.status||'applied') + '">' + (c.status||'applied') + '</span>' +
            '<div class="status-row">' +
              ['applied','registered','interviewed','hired','rejected'].map(s =>
                '<button class="status-btn' + (c.status === s ? ' active' : '') + '" onclick="changeStatus(\'' + id + '\',\'' + s + '\')">' + s + '</button>'
              ).join('') +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="detail-block">' +
          '<div class="block-label">Why ARCA?</div>' +
          '<div class="block-value' + (c.why_arca ? '' : ' muted') + '">' + esc(c.why_arca || 'Not provided') + '</div>' +
        '</div>' +
        '<div class="detail-block">' +
          '<div class="block-label">Interviews</div>' +
          '<div class="block-value">' + interviews.length + ' session' + (interviews.length !== 1 ? 's' : '') + '</div>' +
        '</div>' +
      '</div>' +

      (interviews.length ? '<div style="margin-top:4px;">' +
        '<div class="section-label">Interview Sessions</div>' +
        interviews.map((iv, idx) => renderInterview(iv, idx)).join('') +
      '</div>' : '') +

    '</div>';
}

function renderInterview(iv, idx) {
  const avatarKey = (iv.avatar_used || '').toLowerCase();
  const emoji = AVATAR_EMOJI[avatarKey] || AVATAR_EMOJI.default;
  const scoreClass = iv.ai_score >= 8 ? 'score-high' : iv.ai_score >= 5 ? 'score-mid' : 'score-low';
  const fillClass  = iv.ai_score >= 8 ? 'fill-high'  : iv.ai_score >= 5 ? 'fill-mid'  : 'fill-low';
  const fillPct    = iv.ai_score ? (iv.ai_score / 10 * 100) : 0;
  const dur = iv.duration_seconds ? Math.floor(iv.duration_seconds / 60) + 'm ' + (iv.duration_seconds % 60) + 's' : '—';
  const date = new Date(iv.created_at).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});

  return '<div class="interview-block">' +
    '<div class="interview-header" onclick="toggleInterview(this)">' +
      '<div class="ih-avatar">' + emoji + '</div>' +
      '<div>' +
        '<div class="ih-name">' + esc(iv.avatar_used || 'Unknown') + '</div>' +
        '<div class="ih-meta">' + date + ' · ' + dur + '</div>' +
      '</div>' +
      (iv.ai_score ?
        '<div class="ih-score ' + scoreClass + '">' + iv.ai_score + '<span style="font-size:16px;opacity:0.5">/10</span></div>' : '') +
      '<div class="ih-chevron">▼</div>' +
    '</div>' +
    '<div class="interview-body">' +
      (iv.ai_score ? '<div class="score-wrap"><div class="score-bar"><div class="score-fill ' + fillClass + '" style="width:' + fillPct + '%"></div></div></div>' : '') +
      (iv.ai_summary ? '<div class="summary-text" style="margin-top:16px;">' + esc(iv.ai_summary) + '</div>' : '') +
      (iv.transcript ?
        '<button class="transcript-toggle" onclick="toggleTranscript(this)">▶ Show transcript</button>' +
        '<div class="transcript-box">' + formatTranscript(iv.transcript) + '</div>'
      : '<div style="color:var(--text3);font-size:12px;font-family:JetBrains Mono,monospace;">No transcript available</div>') +
    '</div>' +
  '</div>';
}

function toggleInterview(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
  const chevron = header.querySelector('.ih-chevron');
  chevron.classList.toggle('open');
}

function toggleTranscript(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle('open');
  btn.textContent = box.classList.contains('open') ? '▼ Hide transcript' : '▶ Show transcript';
}

function formatTranscript(text) {
  return esc(text)
    .replace(/HR:/g, '<span style="color:var(--gold);font-weight:600">HR:</span>')
    .replace(/Candidate:/g, '<span style="color:var(--blue);font-weight:600">Candidate:</span>')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════
// ACTIONS
// ═══════════════════════════════
async function changeStatus(candidateId, newStatus) {
  const res = await fetch(SB_URL + '/candidates?id=eq.' + candidateId, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ status: newStatus })
  });
  if (res.ok) {
    const c = allCandidates.find(x => x.id === candidateId);
    if (c) c.status = newStatus;
    renderList();
    selectCandidate(candidateId);
    showToast('Status updated: ' + newStatus, true);
  } else {
    showToast('Failed to update status', false);
  }
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════
// START
// ═══════════════════════════════
if (sessionStorage.getItem('arca_auth') === '1') {
  showDashboard();
}
</script>
